<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta content="text/html; charset=utf-8" http-equiv="content-type"/>
<title>Wayback Machine - Test Sample</title>
<style type="text/css">
body {
    margin:0;
    padding: 20px;
    background-color: #000;
    min-height: 100vh;
    box-sizing: border-box;
}
.notice {
    border: 2px solid #c9ae00;
    background-color: #ffff00;
    padding: 12px;
    position: sticky;
    top: 20px;
    z-index: 1000;
}
.tweet-container {
    font-family: Helvetica, Arial, sans-serif;
    padding: 12px 16px;
    border: 1px solid #cfd9de;
    border-radius: 12px;
    margin-top: 20px;
    margin-left: auto;
    margin-right: auto;
    background-color: white;
    max-width: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    max-width: max-content;
}
.tweet-container > #nonjsonview {
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;
}
.tweet-author {
    display: flex;
    flex-direction: row;
    align-items: center;
    padding-bottom: 0.75rem;
}
.tweet-author-profile-image img {
    width: 48px;
    max-width: 48px;
    height: 48px;
    max-height: 48px;
    overflow: hidden;
    border-radius: 50%;
    margin-right: 5px;
}
.tweet-author-info {
    display: flex;
    flex-direction: column;
}
.tweet-author-name {
    font-weight: bold;
}
.tweet-content {
    font-size: 1.25rem;
}
.tweet-image, .tweet-video {
    width: 100%;
    height: auto;
    margin-top: 12px;
    border-radius: 12px;
    display: block;
}
.embedded-tweet-container {
    box-sizing: border-box;
    margin-top: 12px;
    padding: 12px;
    border: 1px solid #cfd9de;
    border-radius: 12px;
    background-color: white;
    max-width: 100%;
}
.date {
    font-size: 0.75rem;
    color: #657786;
    margin-top: 12px;
}
.date a {
    color: #657786;
    text-decoration: none;
}
.date a:hover {
    text-decoration: underline;
}
.on { display: block; }
.off { display: none; }
</style>
</head>
<body>
<div class="tweet-container on">
<div id="nonjsonview">
  <div class="tweet-author">
  <div class="tweet-author-profile-image">
  <img alt="LuminaArchivea" src="../avatar/reader_chan.png"/>
  </div>
  <div class="tweet-author-info">
  <div class="tweet-author-name">
  LuminaArchivea
  </div>
  <div class="tweet-author-username">
  @LuminaArchivea7853
  </div>
  </div>
  </div>

  <div class="tweet-content">
  这是一个用于测试本地阅读器的示例推文。
  <br/><br/>
  它包含了文字、图片、视频以及引用推文的结构，用于在接收分发时确保所有解析脚本和前端 UI 都能正确渲染多媒体内容与时间戳。

  <img class="tweet-image" src="../image/testimage.png" alt="Dummy test image"/>

  <video controls class="tweet-video" src="../video/Test.mp4"></video>

  <div class="embedded-tweet-container">
  <div class="tweet-author">
  <div class="tweet-author-profile-image">
    <img alt="CelestiaRelicta" src="../avatar/CelestiaRelicta.png"/>
  </div>
  <div class="tweet-author-info">
    <div class="tweet-author-name">
    CelestiaRelicta
    </div>
    <div class="tweet-author-username">
    @CelestiaRelicta0401
    </div>
  </div>
  </div>
  <div class="tweet-content">
  这是一条被引用的测试推文，用于测试嵌套结构的解析是否正常工作。Testing quoted tweets rendering.
  </div>
  <p class="date">
  <a href="#" id="qt_dummy_id">
  </a>
  </p>
  <script>
  // 引用推文的时间戳通常早于主推文
  var dateString = "1989-04-05T10:30:00.000Z";
  var date = new Date(dateString);
  document.getElementById("qt_dummy_id").innerText = date;
  </script>
  </div>

  <p class="date">
  <a href="/" id="parentdate">
  </a>
  </p>
  </div>
</div>
</div>
<script>
var dateString = "1989-04-06T12:00:00.000Z";
var date = new Date(dateString);
var currentURL = window.location.href;
document.querySelector("#parentdate").innerText = date;
document.querySelector("#parentdate").href = currentURL;
</script>
</body>
</html>
